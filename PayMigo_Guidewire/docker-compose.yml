version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/gigkavach
    depends_on:
      - db

  ml-service:
    build:
      context: ./apps/ml-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=gigkavach
    ports:
      - "5432:5432"
